# Single source of truth for the constellation graph.
#
# Edits here are governance-protected per CODEOWNERS. The renderer reads
# this file via `sdlc.render.repo_registry.load_registry()`.
#
# Schema:
#   repos.<id>:
#     name:                 GitHub repository name (string)
#     github_owner:         GitHub owner/org; defaults to hapax-systems
#     description:          schema.org-aligned, refusal-stance opener (≤350 chars)
#     repo_type:            runtime | spec | library | android | wear-os | fork
#     role_in_constellation: 1-sentence locator in the dependency graph
#     license_class:        PolyForm-Strict-1.0.0 | BUSL-1.1 |
#                           CC-BY-NC-ND-4.0 | CC0-1.0 | MIT |
#                           Apache-2.0 | CC-BY-SA-4.0 | upstream
#     value_partition:      adoption_commons | commercial_moat |
#                           internal_apparatus | evidence_artifact | upstream
#     license_posture:      Copy-safe posture summary for publication surfaces.
#     reader_promise:       What a reader can expect from this repo.
#     reader_value:         Why that expectation matters to the target reader.
#     claim_ceiling:        Highest safe public claim until new evidence lands.
#     primary_audience:     [reader segment, ...]
#     surface_class:        adoption_commons | product_front_door |
#                           runtime_mechanism | research_apparatus |
#                           governance_spec | internal_apparatus |
#                           ecosystem_bridge | evidence_artifact |
#                           asset_mirror | upstream
#     visibility:           public | private | local_only
#     source_of_truth:      constitution_registry | council_source |
#                           repo_body | upstream
#     public_files:         Intended publication/support metadata surfaces.
#     dependency_order:     Derived by loader from dependencies; do not set.
#     dependencies:         [<id>, ...] — other repos this depends on
#     topics:               [<topic>, ...] — sparse, schema.org-aligned;
#                           NEVER `ai`/`agents`/`framework`/`tool`/`library`/`awesome`
#     is_first_party:       true | false
#     zenodo_doi:           "10.5281/zenodo.<n>" | null (pre-version-mint)
#     zenodo_concept_doi:   "10.5281/zenodo.<n>" | null (pre-concept-mint)
#     related_identifiers:  [{identifier, relation, scheme}, ...] — DataCite RelatedIdentifier graph

repos:
  hapax-council:
    name: hapax-council
    description: >-
      Source-visible Hapax Systems research/runtime for evidence-bound
      AI-agent delivery: governed dispatch, route receipts, claim review,
      refusal, and publication-egress controls in a single-operator estate.
    repo_type: runtime
    role_in_constellation: >-
      Primary research/runtime estate. Carries task authority, coordination,
      route evidence, claim and publication gates, refusal records, and
      public-egress controls. Consumes the constitution via the hapax-sdlc
      package.
    license_class: PolyForm-Strict-1.0.0
    value_partition: internal_apparatus
    license_posture: >-
      Source-visible strict research/runtime artifact; not open source,
      not a framework, not a supported distribution.
    reader_promise: >-
      Inspect how AI-agent work is authorized, routed, reviewed, refused,
      and surfaced publicly inside the Hapax estate.
    reader_value: >-
      Lets technical leaders, researchers, and auditors evaluate concrete
      controls: what may run, what may write, what evidence exists, and
      where stale or unsupported claims fail closed.
    claim_ceiling: >-
      Source-visible research runtime and current case study only. Not a
      portable platform, adoption package, product front door, support
      surface, or open-source project.
    primary_audience:
      - researchers
      - technical auditors
      - technical leaders
      - harness builders
      - privacy reviewers
    surface_class: research_apparatus
    visibility: public
    source_of_truth: constitution_registry
    public_files:
      - README.md
      - START_HERE.md
      - NOTICE.md
      - LICENSE
      - CITATION.cff
      - codemeta.json
      - .zenodo.json
      - SECURITY.md
      - SUPPORT.md
      - GOVERNANCE.md
      - CONTRIBUTING.md
      - .github/ISSUE_TEMPLATE/config.yml
    dependencies: [hapax-constitution]
    topics:
      - research-software
      - single-operator
      - governed-sdlc
      - claim-authority
      - publication-egress
      - refusal-systems
    is_first_party: true
    zenodo_doi: "10.5281/zenodo.20113515"
    zenodo_concept_doi: "10.5281/zenodo.20113514"
    related_identifiers:
      - identifier: https://github.com/hapax-systems/hapax-constitution
        relation: isPartOf
        scheme: url
      - identifier: https://github.com/hapax-systems/hapax-council/blob/main/START_HERE.md
        relation: isSupplementTo
        scheme: url

  hapax-constitution:
    name: hapax-constitution
    description: >-
      Governance specification for the Hapax operating environment.
      Publishes specification/publication material plus the hapax-sdlc
      enforcement/render tooling consumed by hapax-council and
      hapax-officium. Not seeking contributors.
    repo_type: spec
    role_in_constellation: >-
      Anchor for repo metadata and governance. Defines axioms,
      implications, canons, and precedent records. Other first-party
      repos consume it through `hapax-sdlc`.
    license_class: CC-BY-NC-ND-4.0
    value_partition: evidence_artifact
    license_posture: >-
      Split posture: specification and publication metadata use
      CC BY-NC-ND; runnable hapax-sdlc tooling uses Apache-2.0. Do not
      describe the whole repository as Apache or open source.
    reader_promise: >-
      Governance specification and repo-presentation authority for
      Hapax Systems, with a clear hapax-sdlc tooling boundary.
    reader_value: >-
      Gives reviewers one auditable source for names, licenses, support
      boundaries, and claim ceilings, reducing public-surface drift.
    claim_ceiling: >-
      Specification plus tooling split. Not the Hapax runtime. Not a
      blanket Apache or open-source statement for the whole repository.
    primary_audience:
      - researchers
      - auditors
      - repo maintainers
    surface_class: governance_spec
    visibility: public
    source_of_truth: constitution_registry
    public_files:
      - README.md
      - NOTICE.md
      - LICENSE
      - LICENSE-APACHE
      - LICENSE-SPEC
      - CITATION.cff
      - codemeta.json
      - .zenodo.json
      - SECURITY.md
      - SUPPORT.md
      - GOVERNANCE.md
      - CONTRIBUTING.md
      - .github/ISSUE_TEMPLATE/config.yml
    dependencies: []
    topics:
      - research-software
      - single-operator
      - philosophy-of-science
      - governance
      - infrastructure-as-argument
    is_first_party: true
    zenodo_concept_doi: null
    related_identifiers:
      - identifier: https://github.com/hapax-systems/hapax-council
        relation: isReferencedBy
        scheme: url

